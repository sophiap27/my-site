<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Open? | Live Availability</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#64ffda" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <h1>Is It Open?</h1>
            </div>
            <div class="controls">
                <button id="audio-toggle" class="btn-icon" title="Toggle Background Music">
                    <span id="speaker-icon">🔇</span>
                </button>
            </div>
        </header>

        <main>
            <div class="search-box">
                <button id="find-me" class="btn-primary">Find Nearby Businesses</button>
                <p id="status-msg">Click to check holiday hours near you.</p>
            </div>

            <div id="results-grid" class="grid">
                <!-- Data injected here -->
            </div>
        </main>
    </div>

    <!-- Audio Elements (Using placeholders for demo) -->
    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
