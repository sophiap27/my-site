<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenNow | Aesthetic Holiday Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-header">
        <div class="header-content">
            <svg class="logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <h1>OpenNow</h1>
            <div id="weather-widget" class="weather-hide">
                <span id="temp">--°C</span>
                <span id="weather-desc">Loading sky...</span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="location-input" placeholder="Enter city or neighborhood...">
            <select id="type-input">
                <option value="cafe">Cafes</option>
                <option value="pharmacy">Pharmacies</option>
                <option value="hardware_store">Hardware</option>
            </select>
            <button id="search-btn">
                <span>Check Status</span>
            </button>
        </div>
        
        <div class="controls">
            <button id="music-toggle" class="icon-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                <span>Lo-Fi Focus</span>
            </button>
        </div>
    </div>

    <main id="results-container">
        <div class="initial-state">
            <p>Ready to explore? Enter a location above.</p>
        </div>
    </main>

    <!-- Sound Elements -->
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3"></audio>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&libraries=places&callback=initApp" async defer></script>
    <script src="script.js"></script>
</body>
</html>
